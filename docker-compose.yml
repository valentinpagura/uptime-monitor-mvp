version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: uptime_monitor_db
    environment:
      POSTGRES_USER: uptime_user
      POSTGRES_PASSWORD: uptime_pass
      POSTGRES_DB: uptime_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uptime_network

volumes:
  postgres_data:

networks:
  uptime_network:
    driver: bridge
